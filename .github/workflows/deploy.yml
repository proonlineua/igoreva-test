name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 173.242.49.111 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -v -o IdentitiesOnly=yes -o BatchMode=yes root@173.242.49.111 "echo SSH_OK && whoami" 2>&1 | tail -20

      - name: Copy files to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ root@173.242.49.111:/var/www/beauty-os/

      - name: Install deps & restart
        run: |
          ssh -o IdentitiesOnly=yes root@173.242.49.111 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /var/www/beauty-os

          # Postfix (перший запуск)
          if ! command -v postfix &>/dev/null; then
            DEBIAN_FRONTEND=noninteractive apt-get install -y postfix mailutils
            postconf -e "myhostname=beauty.proonline.com.ua"
            postconf -e "myorigin=beauty.proonline.com.ua"
            postconf -e "inet_interfaces=loopback-only"
            postconf -e "mydestination="
            systemctl enable postfix && systemctl restart postfix
          fi

          # .env — додати відсутні змінні
          ENV=/var/www/beauty-os/.env
          grep -q '^APP_URL=' "$ENV"          || echo 'APP_URL=https://beauty.proonline.com.ua' >> "$ENV"
          grep -q '^SMTP_HOST=' "$ENV"        || echo 'SMTP_HOST=localhost'                      >> "$ENV"
          grep -q '^SMTP_PORT=' "$ENV"        || echo 'SMTP_PORT=25'                             >> "$ENV"
          grep -q '^SMTP_USER=' "$ENV"        || echo 'SMTP_USER=noreply@beauty.proonline.com.ua' >> "$ENV"
          grep -q '^DEPLOY_SECRET=' "$ENV"    || echo "DEPLOY_SECRET=${{ secrets.DEPLOY_SECRET }}" >> "$ENV"

          npm ci --omit=dev
          pm2 reload beauty-os --update-env || pm2 start server/index.js --name beauty-os
          pm2 save
          echo "Done: $(date)"
          REMOTE
