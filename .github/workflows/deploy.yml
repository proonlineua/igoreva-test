name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger git-pull deploy on server
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac '${{ secrets.DEPLOY_SECRET }}' | awk '{print $2}')"
          curl -f -s -o /dev/null -w "HTTP %{http_code}" \
            -X POST https://beauty.proonline.com.ua/api/deploy \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
