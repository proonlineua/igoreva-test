name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger git-pull deploy on server
        run: |
          curl -f -s -o /dev/null -w "HTTP %{http_code}" \
            -X POST https://beauty.proonline.com.ua/api/deploy \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
            -d '{"ref":"refs/heads/main"}'
