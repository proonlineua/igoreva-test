name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 173.242.49.111 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@173.242.49.111 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /var/www/beauty-os
          git fetch --prune origin main
          git reset --hard origin/main
          npm ci --omit=dev
          pm2 reload beauty-os || pm2 start server/index.js --name beauty-os
          pm2 save
          echo "Deployed $(git rev-parse --short HEAD) at $(date)"
          REMOTE
